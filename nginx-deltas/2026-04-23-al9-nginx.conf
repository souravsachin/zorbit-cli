# Zorbit nginx delta — AL9 batch (9 new ZMB-scaffolded modules).
#
# Author:   Soldier BD
# Date:     2026-04-23
# Target:   UAT zu-nginx container (NOT Naineet's nginx).
# Deploy:   Deferred — see 2026-04-23-al9-nginx.APPLY.md for the runbook.
# Source:   Soldier AY deployed these on ports 3050-3058 in the
#           zu-apps-al9 container (separate from zu-apps). No nginx
#           location blocks were added at deploy time; this delta closes
#           that gap so public HTTPS reaches the new module health /
#           manifest / seed endpoints.
#
# Nomenclature (per J73 strict):
#   - public URL slug       = underscore  (e.g. /api/hi_claim_initiation/)
#   - container name        = zu-apps-al9 (AY's separate container)
#   - upstream port         = matches the module table below
#
# Internal route model (all 9 modules, ZMB-scaffold default):
#   - @Controller('api/v1/G/health')     -> root-level
#   - @Controller('api/v1/G/manifest')   -> root-level
#   - @Controller('api/v1/G/seed')       -> root-level
#   - ZorbitEntityCrudModule registers   -> api/<slug>/api/v1/O/...
#
# With the rewrite-strip pattern below:
#   curl .../api/<slug>/api/v1/G/health     -> HITS root /api/v1/G/health (OK)
#   curl .../api/<slug>/api/v1/G/manifest   -> HITS root /api/v1/G/manifest (OK)
#   curl .../api/<slug>/api/v1/O/.../apps   -> MISS (SDK CRUD uses /api/<slug>/... prefix)
#
# The rewrite-strip was chosen because it mirrors the existing `/api/seeder/`
# and `/api/workflow_engine/` style already live in production. CRUD access
# from outside the cluster is intentionally left open for a follow-up delta
# once the SDK CRUD prefix model is settled (tracked as J86 — see runbook).
#
# Drop this file into the zu-nginx config dir that is already covered by
# `include conf.d/*.conf;` inside the zorbit-uat.onezippy.ai server block.
# After placement:
#   docker exec zu-nginx nginx -t && docker exec zu-nginx nginx -s reload

# ---- 1. Network Empanelment Application (port 3050) -------------------
location /api/network_empanelment_application/ {
    set $up_network_empanelment_application http://zu-apps-al9:3050;
    rewrite ^/api/network_empanelment_application/(.*)$ /$1 break;
    proxy_pass $up_network_empanelment_application;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE support for any run-stream endpoint
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
}

