# =============================================================================
# Zorbit — pre-cooked nginx site config
#
# Owner feedback 2026-04-23 (flaw 5):
#   Every environment has its own nginx running inside its own docker network.
#   All module routes are stable and known in advance, so this template ships
#   with ALL module location blocks pre-written. The installer substitutes
#   two tokens only, via sed:
#
#       [[HOSTNAME]]     -> e.g. zorbit-dev.onezippy.ai  (rendered as curly-brace form below)
#       [[ENV_PREFIX]]   -> ze | zq | zd | zu | zp       (rendered as curly-brace form below)
#
#   (The literal substitution markers in this file are the curly-brace forms
#   used in the server blocks below. The brackets above are only for docs.)
#
# Consumer: zorbit-cli/scripts/bootstrap-lib/nginx.sh::generate_nginx_config()
# Generated from: zorbit-core/platform-spec/all-repos.yaml (schema v1.1)
# =============================================================================

server {
    listen 80;
    server_name {{HOSTNAME}};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name {{HOSTNAME}};

    # TLS — wildcard cert assumed; swap in certbot-provided if needed.
    ssl_certificate     /etc/letsencrypt/live/{{HOSTNAME}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{HOSTNAME}}/privkey.pem;

    # ---------------------------------------------------------------
    # Zorbit module routes (auto-rendered from all-repos.yaml)
    # Container names use the env prefix substituted at install time:
    #   ze- = dev, zq- = qa, zd- = demo, zu- = uat, zp- = prod
    # ---------------------------------------------------------------
    location /api/cor-deployment_registry/    { proxy_pass http://{{ENV_PREFIX}}-cor-deployment_registry:3021/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/cor-module_registry/    { proxy_pass http://{{ENV_PREFIX}}-cor-module_registry:3020/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
