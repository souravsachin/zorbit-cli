# Minimal ze-web nginx config — gw-proxy handles TLS upstream
#
# Cycle 105 router fix (soldier h, 2026-04-26): per-service port routing for
# pfs/apps/ai bundles. Previously every /api/pfs-*/ request was forwarded to
# ze-pfs:3100 (pfs-ai_gateway), so 27/28 pfs services were unreachable. Same
# bug for apps (ze-apps:3200) and ai (ze-ai:3600). Each service inside the
# bundle container listens on its own port (see ecosystems/*.ecosystem.config.js).
# Fix: use $service_slug map → $port_pfs / $port_apps / $port_ai, then
# proxy_pass to the right port. Prefix is stripped via the trailing-slash
# rewrite in the regex location.

# ---- Service slug → port maps (mirror of ecosystems/{pfs,apps,ai}.ecosystem.config.js) ----
# Keep these tables in sync with the PM2 ecosystem files. ports out of range
# return empty → upstream error, so unknown slugs fail loudly rather than
# being silently routed to slot 0.

map $service_slug $port_pfs {
    default                "";
    "pfs-ai_gateway"           3100;
    "pfs-analytics_reporting"  3101;
    "pfs-api_integration"      3102;
    "pfs-chat"                 3103;
    "pfs-datatable"            3104;
    "pfs-doc_generator"        3105;
    "pfs-file_storage"         3106;
    "pfs-file_viewer"          3107;
    "pfs-form_builder"         3108;
    "pfs-integration"          3109;
    "pfs-interaction_recorder" 3110;
    "pfs-kyc"                  3111;
    "pfs-medical_coding"       3112;
    "pfs-notification"         3113;
    "pfs-payment_gateway"      3114;
    "pfs-pixel"                3115;
    "pfs-realtime"             3116;
    "pfs-rpa_integration"      3117;
    "pfs-rtc"                  3118;
    "pfs-rules_engine"         3119;
    "pfs-secrets"              3120;
    "pfs-seeder"               3121;
    "pfs-verification"         3122;
    "pfs-voice"                3123;
    "pfs-voice_engine"         3124;
    "pfs-white_label"          3125;
    "pfs-workflow"             3126;
    "pfs-workflow_engine"      3127;
    "pfs-zmb_factory"          3128;
}

map $service_slug $port_apps {
    default                                "";
    "app-sample-customer-service"             3200;
    "app-broker"                              3201;
    "app-claims_core"                         3202;
    "app-claims_intake"                       3203;
    "app-hi_claim_adjudication_workflow"      3204;
    "app-hi_claim_decisioning"                3205;
    "app-hi_claim_initiation"                 3206;
    "app-hi_claim_payment_recon"              3207;
    "app-hi_customer_portal"                  3208;
    "app-hi_quotation"                        3209;
    "app-hi_retail_quotation"                 3210;
    "app-hi_sme_quotation"                    3211;
    "app-hi_uw_decisioning"                   3212;
    "app-jayna"                               3213;
    "app-manufacturing_demo"                  3214;
    "app-mi_quotation"                        3215;
    "app-network_empanelment_application"     3216;
    "app-network_empanelment_workflow"        3217;
    "app-pcg4"                                3218;
    "app-pcg5"                                3219;
    "app-product_pricing"                     3220;
    "app-prospect_portal"                     3221;
    "app-retail_banking_demo"                 3222;
    "app-sample"                              3223;
    "app-sample_module"                       3224;
    "app-slice_of_pie"                        3225;
    "app-uw_workflow"                         3226;
    "app-wealth_mgmt_demo"                    3227;
    "app-zmb_selftest"                        3228;
    "portal-customer"                         3229;
    "portal-prospect"                         3230;
}

map $service_slug $port_ai {
    default                "";
    # ai bundle service slugs to be filled when ze-ai stabilises (soldier h
    # could not enumerate ze-ai while it was crash-looping). Keep the map
    # block so the location below has a destination variable.
    "ai-default"           3600;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # JWT can carry 250+ privileges; default header buffer (4×8K) is too small.
    # Owner directive 2026-04-25: keep this until E-JWT-SLIM ships.
    large_client_header_buffers 8 32k;

    # When proxy_pass uses a variable (e.g. http://ze-pfs:$port_pfs$trailing),
    # nginx does runtime DNS instead of the static upstream resolution. Docker's
    # embedded DNS lives at 127.0.0.11. Without this line, variable-driven
    # proxy_pass returns 502 with "no resolver defined to resolve <name>".
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Health probe
    location = /healthz.txt { access_log off; }

    # ---- Compatibility rewrites for missing backend routes (QA gap fixes) ----
    # SPA hardcodes /users but identity service exposes /users/tree
    rewrite ^/api/identity/api/v1/O/([A-Z0-9-]+)/users$ /api/identity/api/v1/O/$1/users/tree last;
    # Audit service: SPA expects /audit/logs but service exposes /records
    rewrite ^/api/audit/api/v1/G/audit/logs(\?.*)?$ /api/audit/api/v1/G/records$1 last;

    # API routes — strip /api/<slug>/ prefix and forward to bundle service.
    # Trailing slash on proxy_pass strips the matched location prefix.
    location /api/identity/ { proxy_pass http://ze-core:3001/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/authorization/ { proxy_pass http://ze-core:3002/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/navigation/ { proxy_pass http://ze-core:3003/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/event_bus/ { proxy_pass http://ze-core:3004/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/secrets_vault/ { proxy_pass http://ze-core:3023/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/audit/ { proxy_pass http://ze-core:3006/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/pii-vault/ { proxy_pass http://ze-core:3005/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/observability/ { proxy_pass http://ze-core:3022/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/module_registry/ { proxy_pass http://ze-core:3020/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/deployment_registry/ { proxy_pass http://ze-core:3021/;  include /etc/nginx/snippets/proxy.inc; }

    # ---- PFS bundle: per-service port routing ----
    # Capture the slug (pfs-<name>) and trailing path (/...). Look up the
    # slug-specific port via the $port_pfs map. Proxy to ze-pfs:<port> with
    # the slug prefix stripped (only the trailing path is forwarded).
    location ~ ^/api/(?<service_slug>pfs-[a-z0-9_]+)(?<trailing>/.*)$ {
        if ($port_pfs = "") { return 502 "ze-web: unknown pfs service slug '$service_slug' — update map in zorbit.conf\n"; }
        proxy_pass http://ze-pfs:$port_pfs$trailing;
        include /etc/nginx/snippets/proxy.inc;
    }

    # ---- Apps bundle: per-service port routing ----
    # Matches /api/app-<name>/... AND /api/portal-<name>/...
    location ~ ^/api/(?<service_slug>(app|portal)-[a-z0-9_-]+)(?<trailing>/.*)$ {
        if ($port_apps = "") { return 502 "ze-web: unknown apps service slug '$service_slug' — update map in zorbit.conf\n"; }
        proxy_pass http://ze-apps:$port_apps$trailing;
        include /etc/nginx/snippets/proxy.inc;
    }

    # ---- AI bundle: per-service port routing (placeholder until ze-ai stable) ----
    location ~ ^/api/(?<service_slug>ai-[a-z0-9_]+)(?<trailing>/.*)$ {
        if ($port_ai = "") { return 502 "ze-web: unknown ai service slug '$service_slug' — update map in zorbit.conf\n"; }
        proxy_pass http://ze-ai:$port_ai$trailing;
        include /etc/nginx/snippets/proxy.inc;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
