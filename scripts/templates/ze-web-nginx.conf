# Minimal ze-web nginx config — gw-proxy handles TLS upstream
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # Health probe
    location = /healthz.txt { access_log off; }

    # ---- Compatibility rewrites for missing backend routes (QA gap fixes) ----
    # SPA hardcodes /users but identity service exposes /users/tree
    rewrite ^/api/identity/api/v1/O/([A-Z0-9-]+)/users$ /api/identity/api/v1/O/$1/users/tree last;
    # Audit service: SPA expects /audit/logs but service exposes /records
    rewrite ^/api/audit/api/v1/G/audit/logs(\?.*)?$ /api/audit/api/v1/G/records$1 last;

    # API routes — strip /api/<slug>/ prefix and forward to bundle service.
    # Trailing slash on proxy_pass strips the matched location prefix.
    location /api/identity/      { proxy_pass http://ze-core:3001/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/authorization/ { proxy_pass http://ze-core:3002/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/navigation/    { proxy_pass http://ze-core:3003/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/event_bus/     { proxy_pass http://ze-core:3004/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/secrets_vault/ { proxy_pass http://ze-core:3005/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/audit/         { proxy_pass http://ze-core:3006/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/pii-vault/     { proxy_pass http://ze-core:3008/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/observability/ { proxy_pass http://ze-core:3030/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/module_registry/    { proxy_pass http://ze-core:3020/;  include /etc/nginx/snippets/proxy.inc; }
    location /api/deployment_registry/{ proxy_pass http://ze-core:3022/;  include /etc/nginx/snippets/proxy.inc; }

    # PFS / Apps / AI
    location ~ ^/api/pfs-[a-z_]+/ {
        proxy_pass http://ze-pfs:3100;
        include /etc/nginx/snippets/proxy.inc;
    }
    location ~ ^/api/app-[a-z0-9_]+/ {
        proxy_pass http://ze-apps:3200;
        include /etc/nginx/snippets/proxy.inc;
    }
    location ~ ^/api/ai-[a-z_]+/ {
        proxy_pass http://ze-ai:3600;
        include /etc/nginx/snippets/proxy.inc;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
